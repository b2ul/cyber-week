<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إعادة تعيين النظام</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #050505; color: #00ff88; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .card { background: #0a0a0a; border: 0.5px solid #1a1a1a; border-radius: 12px; padding: 2.5rem; max-width: 380px; width: 100%; text-align: center; display: flex; flex-direction: column; gap: 1.25rem; }
  h1 { font-size: 1.4rem; color: #fff; }
  p { color: #666; font-size: 0.9rem; line-height: 1.6; }
  input { width: 100%; background: #111; border: 0.5px solid #222; border-radius: 6px; padding: 12px; color: #fff; font-size: 1rem; font-family: 'Cairo', sans-serif; outline: none; text-align: center; }
  input:focus { border-color: #00ff88; }
  button { width: 100%; padding: 13px; background: transparent; border: 1px solid #ff4444; border-radius: 6px; color: #ff4444; font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; }
  button:hover { background: #ff444411; }
  .msg { font-size: 13px; min-height: 20px; }
  .msg.success { color: #00ff88; }
  .msg.error { color: #ff4444; }
</style>
</head>
<body>
<div class="card">
  <h1>🔄 إعادة تعيين النظام</h1>
  <p>استخدمي هذه الصفحة قبل كل فعالية لمسح اسم الفائز السابق</p>
  <input type="password" id="secretInput" placeholder="كلمة المرور السرية" />
  <button onclick="doReset()">إعادة تعيين النظام</button>
  <div class="msg" id="msg"></div>
</div>
 
<script>
async function doReset() {
  const secret = document.getElementById('secretInput').value.trim();
  const msg = document.getElementById('msg');
  if (!secret) { msg.textContent = 'أدخلي كلمة المرور'; msg.className = 'msg error'; return; }
  try {
    const res = await fetch('/api/winner', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ secret })
    });
    const data = await res.json();
    if (data.success) {
      msg.textContent = '✓ تمت إعادة التعيين بنجاح — النظام جاهز للفعالية!';
      msg.className = 'msg success';
    } else {
      msg.textContent = 'كلمة مرور خاطئة';
      msg.className = 'msg error';
    }
  } catch(e) {
    msg.textContent = 'خطأ في الاتصال';
    msg.className = 'msg error';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Enter') doReset(); });
</script>
</body>
</html>
